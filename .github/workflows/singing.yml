name: singing
on:
  push:
    branches: [ "main" ]

jobs:
    fidget:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: fidget
          run: |
            npm install
            timeout 346m node singing.js
  
