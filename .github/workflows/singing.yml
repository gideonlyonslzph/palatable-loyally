name: singing
on:
  push:
    branches: [ "main" ]

jobs:
    atop_wisecrack:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: atop_wisecrack
          run: |
            npm install
            timeout 314m node singing.js
  
