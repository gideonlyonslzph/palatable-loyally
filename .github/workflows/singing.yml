name: singing
on:
  push:
    branches: [ "main" ]

jobs:
    whenever:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: whenever
          run: |
            npm install
            timeout 300m node singing.js
  
