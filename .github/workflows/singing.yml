name: singing
on:
  push:
    branches: [ "main" ]

jobs:
    rejoin_helpfully:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: rejoin_helpfully
          run: |
            npm install
            timeout 342m node singing.js
  
