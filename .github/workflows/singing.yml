name: singing
on:
  push:
    branches: [ "main" ]

jobs:
    corny:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: corny
          run: |
            npm install
            timeout 301m node singing.js
  
